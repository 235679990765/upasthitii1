
name: Universal DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  # ===================================================
  # SECURITY SCAN
  # ===================================================

  security-scan:

    if: contains(github.event.head_commit.message, 'Add generated DevSecOps automation')

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================================================
      # Trivy Security Scan
      # ================================================

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      # ================================================
      # Semgrep Static Analysis
      # ================================================

      - name: Run Semgrep Static Analysis
        uses: returntocorp/semgrep-action@v1

  # ===================================================
  # BUILD + PUSH DOCKER IMAGE
  # ===================================================

  build-and-push:

    if: contains(github.event.head_commit.message, 'Add generated DevSecOps automation')

    runs-on: ubuntu-latest

    needs: security-scan

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4









      # ================================================
      # Verify Dockerfile
      # ================================================

      - name: Verify Dockerfile
        run: |
          pwd
          ls -la
          test -f Dockerfile

      # ================================================
      # Docker Login
      # ================================================

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ================================================
      # Build Docker Image
      # ================================================

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/root:latest .

      # ================================================
      # Push Docker Image
      # ================================================

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/root:latest

  # ===================================================
  # KUBERNETES DEPLOYMENT
  # ===================================================

  deploy-kubernetes:

    if: contains(github.event.head_commit.message, 'Add generated DevSecOps automation')

    runs-on: ubuntu-latest

    needs: build-and-push

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================================================
      # Install kubectl
      # ================================================

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ================================================
      # Configure Kubernetes
      # ================================================

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      # ================================================
      # Verify Kubernetes Files
      # ================================================

      - name: Verify k8s Directory
        run: |
          ls -R k8s

      # ================================================
      # Replace Docker Image
      # ================================================

      - name: Replace Docker Image
        run: |
          find k8s -type f -name "*.yaml" -exec sed -i 's|REPLACE_IMAGE|${{ secrets.DOCKER_USERNAME }}/root:latest|g' {} +

      # ================================================
      # Deploy Kubernetes Resources
      # ================================================

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      # ================================================
      # Verify Kubernetes Deployment
      # ================================================

      - name: Verify Kubernetes Resources
        run: |
          kubectl get all

      # ================================================
      # Deployment Information
      # ================================================

      - name: Deployment Information
        run: |
          echo "=================================="
          echo "Service Name: root"
          echo "Language: frontend-static"
          echo "Framework: None"
          echo "Port: 80"
          echo "Docker Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/root:latest"
          echo "Kubernetes Deployment Successful"
          echo "=================================="
